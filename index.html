<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Spanish Vocabulary</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #07090f;
    --bg-mid:     #0d1120;
    --glass-bg:   rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --glass-hover: rgba(255,255,255,0.08);
    --accent-blue: #4f8ef7;
    --accent-gold: #f0b429;
    --accent-red:  #e5484d;
    --accent-green:#3dd68c;
    --text-primary: #eef0f6;
    --text-secondary: #7e8ba8;
    --text-muted:  #3d4860;
    --marked-bg:   rgba(229,72,77,0.15);
    --marked-border: rgba(229,72,77,0.4);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans Arabic', 'Geeza Pro', Tahoma, Arial, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background orbs */
  body::before {
    content:'';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content:'';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,180,41,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(7,9,15,0.75);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--glass-border);
    padding: 0 28px;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .brand-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #4f8ef7, #a259f7);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 18px rgba(79,142,247,0.35);
  }
  .brand-text h1 { font-size: 17px; font-weight: 800; color: var(--text-primary); line-height: 1.2; }
  .brand-text span { font-size: 12px; color: var(--accent-blue); font-weight: 500; }

  .header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ─── GLASS BUTTON ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 10px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s;
    white-space: nowrap;
  }
  .btn svg { flex-shrink: 0; }
  .btn-glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    backdrop-filter: blur(12px);
  }
  .btn-glass:hover { background: var(--glass-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.16); }
  .btn-primary {
    background: linear-gradient(135deg, #4f8ef7, #3a6fd8);
    color: #fff;
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
  }
  .btn-primary:hover { box-shadow: 0 6px 22px rgba(79,142,247,0.45); transform: translateY(-1px); }
  .btn-gold {
    background: linear-gradient(135deg, #f0b429, #d4910a);
    color: #0d0a00;
    box-shadow: 0 4px 16px rgba(240,180,41,0.25);
  }
  .btn-gold:hover { box-shadow: 0 6px 22px rgba(240,180,41,0.4); transform: translateY(-1px); }
  .btn-green {
    background: linear-gradient(135deg, #3dd68c, #28a869);
    color: #001a0d;
    box-shadow: 0 4px 16px rgba(61,214,140,0.25);
  }
  .btn-green:hover { box-shadow: 0 6px 22px rgba(61,214,140,0.4); transform: translateY(-1px); }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 7px; }
  .btn-icon { padding: 7px; border-radius: 8px; }

  /* ─── MAIN LAYOUT ─── */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; position: relative; z-index: 1; }

  /* ─── STAT CHIPS ─── */
  .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    border-radius: 10px;
    padding: 10px 16px;
    flex: 1; min-width: 130px;
  }
  .stat-chip-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .stat-chip-icon.blue  { background: rgba(79,142,247,0.15); }
  .stat-chip-icon.gold  { background: rgba(240,180,41,0.15); }
  .stat-chip-icon.red   { background: rgba(229,72,77,0.15); }
  .stat-chip-icon.green { background: rgba(61,214,140,0.15); }
  .stat-num { font-size: 20px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  /* ─── SEARCH ─── */
  .search-wrap {
    position: relative; margin-bottom: 16px;
  }
  .search-icon {
    position: absolute; top: 50%; left: 14px; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 12px 16px 12px 44px;
    font-family: inherit; font-size: 14px;
    color: var(--text-primary);
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: ltr;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { outline: none; border-color: rgba(79,142,247,0.5); box-shadow: 0 0 0 3px rgba(79,142,247,0.1); }

  /* ─── CATEGORY PILLS ─── */
  .cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .cat-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    color: var(--text-secondary);
    transition: all 0.18s;
    font-family: inherit;
  }
  .cat-pill:hover { background: var(--glass-hover); color: var(--text-primary); }
  .cat-pill.active {
    background: rgba(79,142,247,0.18);
    border-color: rgba(79,142,247,0.45);
    color: var(--accent-blue);
  }

  /* ─── ADD WORD PANEL ─── */
  .add-panel {
    background: var(--glass-bg);
    border: 1px solid rgba(61,214,140,0.25);
    backdrop-filter: blur(16px);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }
  .add-panel.open { display: block; }
  .add-panel-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--accent-green); display: flex; align-items: center; gap: 6px; }
  .add-panel-fields { display: flex; gap: 10px; flex-wrap: wrap; }
  .add-input {
    flex: 1; min-width: 160px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 9px;
    padding: 10px 14px;
    font-family: inherit; font-size: 14px;
    color: var(--text-primary);
  }
  .add-input:focus { outline: none; border-color: rgba(61,214,140,0.5); }
  .add-input::placeholder { color: var(--text-muted); }

  /* ─── TABLE ─── */
  .results-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; gap: 8px;
  }
  .results-count { font-size: 12px; color: var(--text-muted); }
  .marked-toggle {
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
    cursor: pointer;
    color: var(--text-secondary);
    background: none; border: none; font-family: inherit;
    padding: 4px 8px; border-radius: 6px; transition: color 0.2s;
  }
  .marked-toggle:hover { color: var(--accent-red); }
  .marked-toggle.active { color: var(--accent-red); }

  .table-wrap {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    border-radius: 16px;
    overflow: hidden;
  }
  .table-head {
    display: grid;
    grid-template-columns: 36px 1fr 1fr;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--glass-border);
  }
  .th {
    font-size: 11px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text-muted);
  }
  .th.es { color: rgba(79,142,247,0.7); }
  .th.ar { color: rgba(240,180,41,0.7); text-align: right; direction: rtl; unicode-bidi: isolate; }

  .row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr;
    padding: 10px 16px;
    align-items: center;
    cursor: default;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .row:last-child { }
  .row:nth-child(even) { background: rgba(255,255,255,0.015); }
  .row:hover { background: var(--glass-hover); }
  .row.pressing { background: rgba(79,142,247,0.12); transform: scale(0.99); }
  .row.marked {
    background: var(--marked-bg);
  }
  .row.marked:hover { background: rgba(229,72,77,0.2); }

  .row-num { font-size: 11px; color: var(--text-muted); user-select: none; }

  .cell-es {
    font-size: 14px; font-weight: 500; color: #b8cfff;
    padding-right: 12px; direction: ltr; text-align: left;
  }
  .row.marked .cell-es { color: #fff; font-weight: 600; }

  .cell-ar {
    font-size: 14px; color: #f5d98a;
    text-align: right; direction: rtl; unicode-bidi: isolate;
    padding-left: 12px;
  }
  .row.marked .cell-ar { color: #fff; font-weight: 600; }

  /* ─── CONTEXT MENU ─── */
  .ctx-menu {
    position: fixed;
    z-index: 250;
    min-width: 180px;
    background: rgba(20,25,40,0.97);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 14px;
    padding: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
    opacity: 0;
    transform: scale(0.92) translateY(6px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
  }
  .ctx-menu.open {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }
  .ctx-backdrop {
    position: fixed; inset: 0; z-index: 249;
    display: none;
  }
  .ctx-backdrop.open { display: block; }
  .ctx-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 11px 14px;
    border-radius: 9px;
    background: none;
    color: var(--text-primary);
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer;
    text-align: left;
    direction: ltr;
  }
  .ctx-item:hover { background: rgba(255,255,255,0.07); }
  .ctx-item.danger { color: var(--accent-red); }
  .ctx-item.danger:hover { background: rgba(229,72,77,0.12); }
  .ctx-item svg { flex-shrink: 0; }
  .ctx-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 6px; }

  /* Inline edit inputs */
  .edit-row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr auto;
    gap: 6px;
    padding: 10px 16px;
    align-items: center;
  }

  /* Inline edit inputs */
  .edit-input {
    width: 100%;
    background: rgba(79,142,247,0.08);
    border: 1px solid rgba(79,142,247,0.35);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: inherit; font-size: 13px;
    color: var(--text-primary);
    margin-right: 4px;
  }
  .edit-input:focus { outline: none; border-color: var(--accent-blue); }
  .edit-input.ar { direction: rtl; text-align: right; unicode-bidi: isolate; }
  .save-btn { background: var(--accent-green); color: #001a0d; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cancel-btn { background: rgba(255,255,255,0.08); color: var(--text-secondary); border-radius: 8px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .edit-actions { display: flex; gap: 6px; }

  /* ─── QUIZ OVERLAY ─── */
  .quiz-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(7,9,15,0.92);
    backdrop-filter: blur(20px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .quiz-overlay.open { display: flex; }
  .quiz-box {
    width: 100%; max-width: 480px;
  }
  .quiz-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
  }
  .quiz-progress-text { font-size: 13px; color: var(--text-secondary); }
  .quiz-progress-bar {
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px; margin-top: 8px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4f8ef7, #a259f7);
    border-radius: 2px;
    transition: width 0.4s;
  }
  .quiz-card {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 22px;
    padding: 52px 36px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s, transform 0.2s;
    min-height: 230px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin-bottom: 20px;
    user-select: none;
  }
  .quiz-card:hover { transform: translateY(-2px); }
  .quiz-card.flipped {
    border-color: rgba(61,214,140,0.4);
    background: rgba(61,214,140,0.06);
  }
  .quiz-lang-label {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; margin-bottom: 18px;
  }
  .quiz-word {
    font-size: 30px; font-weight: 800; line-height: 1.3;
    color: #fff;
  }
  .quiz-hint { margin-top: 16px; font-size: 12px; color: var(--text-muted); }
  .quiz-next {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #3dd68c, #28a869);
    border: none; border-radius: 14px;
    font-family: inherit; font-size: 16px; font-weight: 700;
    color: #001a0d; cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    display: none;
  }
  .quiz-next.show { display: block; }
  .quiz-next:hover { transform: translateY(-2px); opacity: 0.92; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    z-index: 300;
    background: rgba(20,25,40,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 14px; font-weight: 600;
    color: var(--text-primary);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ─── EMPTY ─── */
  .empty {
    padding: 60px 20px; text-align: center;
    color: var(--text-muted); font-size: 14px;
  }
  .empty svg { margin-bottom: 14px; display: block; margin-inline: auto; opacity: 0.4; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .header-inner { height: auto; padding: 12px 0; }
    .table-head, .row { grid-template-columns: 30px 1fr 1fr 72px; }
    .cell-es, .cell-ar { font-size: 13px; }
    .quiz-word { font-size: 24px; }
    .stat-chip { min-width: 100px; }
  }

  /* ─── NO BORDERS ANYWHERE ─── */
  *:not(.ctx-menu) {
    border: none !important;
    border-width: 0 !important;
    box-shadow: none !important;
    outline: none !important;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>My Spanish Vocabulary</h1>
        <span id="subtitle-count">Loading...</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-gold" onclick="startQuiz()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-1.04z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-1.04z"/></svg>
        Quiz yourself
      </button>
      <button class="btn btn-green" onclick="toggleAddPanel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
      <button class="btn btn-glass" onclick="downloadCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        CSV
      </button>
      <button class="btn btn-glass" onclick="document.getElementById('import-input').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import
      </button>
      <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(event)"/>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-chip">
      <div class="stat-chip-icon blue">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div>
        <div class="stat-num" id="stat-total" style="color:#4f8ef7">0</div>
        <div class="stat-label">Total words</div>
      </div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-icon red">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e5484d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div>
        <div class="stat-num" id="stat-marked" style="color:#e5484d">0</div>
        <div class="stat-label">Need review</div>
      </div>
    </div>

// ─── STATE ──────────────────────────────────────────
let words = [];
let marked = new Set();
let editingId = null;
let activeCat = 0;
let showMarkedOnly = false;

// Quiz
let quizPool = [];
let quizIdx = 0;
let quizFlipped = false;

// ─── PERSISTENCE ─────────────────────────────────────
const STORAGE_KEY = 'spanishVocabApp_v1';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      words,
      marked: [...marked],
      activeCat
    }));
  } catch (e) { /* storage unavailable, fail silently */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

// ─── INIT ────────────────────────────────────────────
function parseCSV(text) {
  return text.trim().split('\n').slice(1).map((line, i) => {
    const ci = line.indexOf(',');
    if (ci < 0) return null;
    return { id: i + 1, spanish: line.slice(0, ci).trim(), arabic: line.slice(ci + 1).trim() };
  }).filter(Boolean);
}

function init() {
  const saved = loadState();
  if (saved && Array.isArray(saved.words) && saved.words.length > 0) {
    words = saved.words;
    marked = new Set(saved.marked || []);
    activeCat = typeof saved.activeCat === 'number' ? saved.activeCat : 0;
  } else {
    words = parseCSV(RAW_CSV);
  }
  buildCats();
  render();
}

// ─── CATEGORIES ──────────────────────────────────────
function buildCats() {
  const c = document.getElementById('cats-container');
  c.innerHTML = '';
  CATEGORIES.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (i === activeCat ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => { activeCat = i; buildCats(); render(); saveState(); };
    c.appendChild(btn);
  });
}

// ─── RENDER ──────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const cat = CATEGORIES[activeCat];
  return words.filter(w => {
    const inCat = cat.key === 'all' || (cat.words && cat.words.includes(w.spanish));
    const inSearch = !q || w.spanish.toLowerCase().includes(q) || w.arabic.includes(q);
    const inMarked = !showMarkedOnly || marked.has(w.id);
    return inCat && inSearch && inMarked;
  });
}

function render() {
  const filtered = getFiltered();
  const body = document.getElementById('table-body');

  // stats
  document.getElementById('stat-total').textContent = words.length;
  document.getElementById('stat-marked').textContent = marked.size;
  document.getElementById('stat-known').textContent = words.length - marked.size;
  document.getElementById('stat-shown').textContent = filtered.length;
  document.getElementById('subtitle-count').textContent = `${words.length} words • A1 Spanish - Arabic`;
  document.getElementById('results-count').textContent = filtered.length + ' words';

  if (filtered.length === 0) {
    body.innerHTML = `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>No results found</div>`;
    return;
  }

  body.innerHTML = filtered.map((w, idx) => {
    const isMarked = marked.has(w.id);
    const isEditing = editingId === w.id;

    const saveIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const xIcon    = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

    if (isEditing) {
      return `<div class="edit-row" id="row-${w.id}">
        <span class="row-num">${idx+1}</span>
        <input class="edit-input" id="edit-es-${w.id}" value="${escHtml(w.spanish)}" style="direction:ltr;text-align:left"/>
        <input class="edit-input ar" id="edit-ar-${w.id}" value="${escHtml(w.arabic)}"/>
        <div class="edit-actions">
          <button class="save-btn" onclick="saveEdit(${w.id})">${saveIcon}</button>
          <button class="cancel-btn" onclick="cancelEdit()">${xIcon}</button>
        </div>
      </div>`;
    }

    return `<div class="row ${isMarked ? 'marked' : ''}" id="row-${w.id}" data-word-id="${w.id}">
      <span class="row-num">${idx+1}</span>
      <span class="cell-es">${escHtml(w.spanish)}</span>
      <span class="cell-ar">${escHtml(w.arabic)}</span>
    </div>`;
  }).join('');

  attachRowGestures();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── ROW GESTURES (long-press → menu, double-tap → mark) ──
const LONG_PRESS_MS = 450;
const DOUBLE_TAP_MS = 320;
const MOVE_CANCEL_PX = 10;

let pressTimer = null;
let pressStartXY = null;
let lastTapInfo = { id: null, time: 0 };

function attachRowGestures() {
  document.querySelectorAll('.row[data-word-id]').forEach(row => {
    const id = Number(row.dataset.wordId);

    const start = (x, y) => {
      pressStartXY = { x, y };
      row.classList.add('pressing');
      clearTimeout(pressTimer);
      pressTimer = setTimeout(() => {
        row.classList.remove('pressing');
        if (navigator.vibrate) navigator.vibrate(8);
        openCtxMenu(id, row);
      }, LONG_PRESS_MS);
    };
    const cancel = () => {
      clearTimeout(pressTimer);
      row.classList.remove('pressing');
    };
    const move = (x, y) => {
      if (!pressStartXY) return;
      const dx = Math.abs(x - pressStartXY.x), dy = Math.abs(y - pressStartXY.y);
      if (dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX) cancel();
    };
    const end = () => {
      cancel();
    };
    const tap = () => {
      const now = Date.now();
      if (lastTapInfo.id === id && now - lastTapInfo.time < DOUBLE_TAP_MS) {
        lastTapInfo = { id: null, time: 0 };
        toggleMark(id);
      } else {
        lastTapInfo = { id, time: now };
      }
    };

    row.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    row.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    row.addEventListener('touchend', e => { end(); tap(); });
    row.addEventListener('touchcancel', cancel);

    row.addEventListener('mousedown', e => start(e.clientX, e.clientY));
    row.addEventListener('mousemove', e => move(e.clientX, e.clientY));
    row.addEventListener('mouseup', () => { end(); tap(); });
    row.addEventListener('mouseleave', cancel);

    row.addEventListener('contextmenu', e => { e.preventDefault(); openCtxMenu(id, row); });
  });
}

// ─── CONTEXT MENU ────────────────────────────────────
function openCtxMenu(id, rowEl) {
  const w = words.find(w => w.id === id);
  if (!w) return;
  const isMarked = marked.has(id);

  const menu = document.getElementById('ctx-menu');
  const backdrop = document.getElementById('ctx-backdrop');

  const markIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="${isMarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const editIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  const delIcon  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

  menu.innerHTML = `
    <button class="ctx-item" onclick="toggleMark(${id}); closeCtxMenu();">
      ${markIcon} ${isMarked ? 'Unmark review' : 'Mark for review'}
    </button>
    <button class="ctx-item" onclick="startEdit(${id}); closeCtxMenu();">
      ${editIcon} Edit
    </button>
    <div class="ctx-divider"></div>
    <button class="ctx-item danger" onclick="deleteWord(${id});">
      ${delIcon} Delete
    </button>
  `;

  // position near the row, clamped to viewport
  const rect = rowEl.getBoundingClientRect();
  const menuWidth = 200, menuHeight = 150;
  let top = rect.bottom + 6;
  let left = rect.left + rect.width / 2 - menuWidth / 2;
  if (top + menuHeight > window.innerHeight) top = rect.top - menuHeight - 6;
  if (left < 8) left = 8;
  if (left + menuWidth > window.innerWidth - 8) left = window.innerWidth - menuWidth - 8;

  menu.style.top = top + 'px';
  menu.style.left = left + 'px';

  backdrop.classList.add('open');
  menu.classList.add('open');
}

function closeCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('open');
  document.getElementById('ctx-backdrop').classList.remove('open');
}

// ─── MARK ────────────────────────────────────────────
function toggleMark(id) {
  if (marked.has(id)) marked.delete(id);
  else marked.add(id);
  render();
  saveState();
}

function toggleShowMarked() {
  showMarkedOnly = !showMarkedOnly;
  const btn = document.getElementById('show-marked-btn');
  btn.classList.toggle('active', showMarkedOnly);
  render();
}

// ─── EDIT ────────────────────────────────────────────
function startEdit(id) { editingId = id; render(); setTimeout(() => document.getElementById('edit-es-'+id)?.focus(), 50); }
function cancelEdit() { editingId = null; render(); }
function saveEdit(id) {
  const es = document.getElementById('edit-es-'+id)?.value.trim();
  const ar = document.getElementById('edit-ar-'+id)?.value.trim();
  if (!es || !ar) return;
  words = words.map(w => w.id === id ? {...w, spanish: es, arabic: ar} : w);
  editingId = null;
  render();
  saveState();
  showToast('Saved');
}

// ─── ADD ─────────────────────────────────────────────
function toggleAddPanel() {
  const p = document.getElementById('add-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) document.getElementById('new-es').focus();
}

function addWord() {
  const es = document.getElementById('new-es').value.trim();
  const ar = document.getElementById('new-ar').value.trim();
  if (!es || !ar) { showToast('Enter the word and its translation'); return; }
  words.push({ id: Date.now(), spanish: es, arabic: ar });
  document.getElementById('new-es').value = '';
  document.getElementById('new-ar').value = '';
  document.getElementById('add-panel').classList.remove('open');
  activeCat = 0; buildCats();
  render();
  saveState();
  showToast('Added');
}

// ─── DELETE ──────────────────────────────────────────
function deleteWord(id) {
  closeCtxMenu();
  if (!confirm('Delete this word?')) return;
  words = words.filter(w => w.id !== id);
  marked.delete(id);
  render();
  saveState();
  showToast('Deleted');
}

// ─── CSV ─────────────────────────────────────────────
function downloadCSV() {
  const csv = 'Spanish,Arabic\n' + words.map(w => `${w.spanish},${w.arabic}`).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'spanish_vocab.csv'; a.click();
  showToast('Downloaded');
}

function importCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const imported = parseCSV(ev.target.result);
    if (imported.length > 0) { words = imported; marked.clear(); render(); saveState(); showToast(`Imported ${imported.length} words`); }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
}

// ─── QUIZ ────────────────────────────────────────────
function startQuiz() {
  const pool = [...getFiltered()].sort(() => Math.random() - 0.5);
  if (pool.length === 0) { showToast('No words available!'); return; }
  quizPool = pool; quizIdx = 0; quizFlipped = false;
  document.getElementById('quiz-overlay').classList.add('open');
  renderQuizCard();
}

function renderQuizCard() {
  const card = quizPool[quizIdx];
  const total = quizPool.length;
  document.getElementById('quiz-prog-text').textContent = `${quizIdx + 1} / ${total}`;
  document.getElementById('quiz-prog-fill').style.width = ((quizIdx + 1) / total * 100) + '%';
  document.getElementById('quiz-card').classList.remove('flipped');
  document.getElementById('quiz-lang').style.color = '#4f8ef7';
  document.getElementById('quiz-lang').textContent = '🇪🇸 Spanish';
  document.getElementById('quiz-word').textContent = card.spanish;
  document.getElementById('quiz-word').style.direction = 'ltr';
  document.getElementById('quiz-hint').style.display = '';
  document.getElementById('quiz-next').classList.remove('show');
  quizFlipped = false;
}

function flipCard() {
  if (quizFlipped) return;
  quizFlipped = true;
  const card = quizPool[quizIdx];
  document.getElementById('quiz-card').classList.add('flipped');
  document.getElementById('quiz-lang').style.color = '#3dd68c';
  document.getElementById('quiz-lang').textContent = '🇪🇬 Arabic';
  document.getElementById('quiz-word').textContent = card.arabic;
  document.getElementById('quiz-word').style.direction = 'rtl';
  document.getElementById('quiz-hint').style.display = 'none';
  document.getElementById('quiz-next').classList.add('show');
  const isLast = quizIdx + 1 >= quizPool.length;
  document.getElementById('quiz-next').textContent = isLast ? '🎉 Done!' : 'Next →';
}

function nextCard() {
  quizIdx++;
  if (quizIdx >= quizPool.length) { closeQuiz(); showToast('🎉 Nice work! You finished the deck'); return; }
  renderQuizCard();
}

function closeQuiz() { document.getElementById('quiz-overlay').classList.remove('open'); }

// ─── TOAST ───────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ─── KEYBOARD ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeQuiz(); cancelEdit(); closeCtxMenu(); document.getElementById('add-panel').classList.remove('open'); }
  if (document.getElementById('quiz-overlay').classList.contains('open')) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); quizFlipped ? nextCard() : flipCard(); }
  }
});

init();
</script>
